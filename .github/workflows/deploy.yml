name: Deploy to Production
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'next.config.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server deploy
        run: |
          curl -X POST http://43.132.171.203:9999/push || true
